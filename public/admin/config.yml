# TODO: Create a GitHub OAuth App and configure it in Decap — see https://decapcms.org/docs/github-backend/
backend:
  name: github
  repo: harjot85/zenmartialarts
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: schedule
    label: Class Schedule
    files:
      - name: schedule
        label: Schedule
        file: src/content/schedule.json
        fields:
          - label: Days
            name: days
            widget: list
            fields:
              - { label: Day, name: day, widget: string, hint: "e.g. Monday" }
              - { label: Short Day, name: shortDay, widget: string, hint: "e.g. Mon" }
              - label: Classes
                name: classes
                widget: list
                fields:
                  - { label: Time, name: time, widget: string, hint: "e.g. 6:30 PM" }
                  - { label: Class Name, name: name, widget: string }
                  - label: Category
                    name: category
                    widget: select
                    options:
                      - { label: Adults, value: adults }
                      - { label: Kids, value: kids }
                  - { label: Duration (optional), name: duration, widget: string, required: false, hint: "e.g. 4:00–5:15pm" }
